name: Watchdog

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

permissions:
  contents: read
  actions: write

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
      - run: npm ci

      - name: Check if main workflow is overdue
        id: check
        run: |
          node -e "
          const fs = require('fs');
          try {
            const lastRun = fs.readFileSync('plans/.last-run', 'utf8').trim();
            const lastRunTime = new Date(lastRun);
            const now = new Date();
            const minutesSince = (now - lastRunTime) / 1000 / 60;
            console.log('Last run:', lastRun);
            console.log('Minutes since last run:', minutesSince.toFixed(1));
            if (minutesSince > 90) {
              console.log('OVERDUE — last run was', minutesSince.toFixed(0), 'minutes ago');
              process.exit(1);
            } else {
              console.log('OK — within 90 minute window');
              process.exit(0);
            }
          } catch(e) {
            console.log('No last-run file found — treating as overdue');
            process.exit(1);
          }
          "
        continue-on-error: true

      - name: Trigger main workflow if overdue
        if: steps.check.outcome == 'failure'
        run: |
          curl -X POST \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github.v3+json" \
            https://api.github.com/repos/${{ github.repository }}/actions/workflows/analyze.yml/dispatches \
            -d '{"ref":"main"}'
