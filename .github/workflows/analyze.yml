name: Hourly XAUUSD Analysis

on:
  schedule:
    - cron: '5 * * * *'
  workflow_dispatch:

concurrency:
  group: xauusd-analysis
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  analyze:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
      - run: npm ci
      - name: Check market hours
        id: market
        continue-on-error: true
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: node src/utils/marketHours.js
      - name: Run analysis
        if: steps.market.outcome == 'success'
        env:
          TWELVEDATA_API_KEY: ${{ secrets.TWELVEDATA_API_KEY }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          DEEPSEEK_MODEL: deepseek-chat
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
          METALPRICE_API_KEY: ${{ secrets.METALPRICE_API_KEY }}
          METALSDEV_API_KEY: ${{ secrets.METALSDEV_API_KEY }}
        run: node src/run.js
      - name: Commit plan
        if: steps.market.outcome == 'success'
        run: |
          git config user.name "xauusd-bot"
          git config user.email "bot@users.noreply.github.com"
          git add plans/ README.md plans/.last-run
          git diff --staged --quiet || git commit -m "plan: $(date -u +'%Y-%m-%d %H:00 UTC')"
          git push
      - name: Notify failure
        if: failure()
        run: |
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -H "Content-Type: application/json" \
            -d "{\"chat_id\":\"${{ secrets.TELEGRAM_CHAT_ID }}\",\"text\":\"🔴 XAUUSD workflow failed at $(date -u +'%H:%M UTC'). Check Actions tab.\",\"parse_mode\":\"HTML\"}"
