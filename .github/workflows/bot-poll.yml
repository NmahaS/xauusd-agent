name: Telegram Bot Poll

on:
  schedule:
    - cron: '*/3 * * * *'
  workflow_dispatch:

concurrency:
  group: xauusd-bot-poll
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  poll:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
      - run: npm ci
      - name: Poll Telegram
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          IG_API_KEY: ${{ secrets.IG_API_KEY }}
          IG_USERNAME: ${{ secrets.IG_USERNAME }}
          IG_PASSWORD: ${{ secrets.IG_PASSWORD }}
          IG_DEMO: ${{ secrets.IG_DEMO }}
          IG_ACCOUNT_ID: ${{ secrets.IG_ACCOUNT_ID }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          PERPLEXITY_API_KEY: ${{ secrets.PERPLEXITY_API_KEY }}
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
          SYMBOL: XAU/AUD
          CURRENCY: AUD
          AUTO_TRADE: 'false'
          DRY_EXECUTE: 'true'
        run: node src/telegram/bot.js
      - name: Commit offset
        run: |
          git config user.name "xauusd-bot"
          git config user.email "bot@users.noreply.github.com"
          git add plans/.last-update-id
          if git diff --staged --quiet; then
            echo "no offset change"
          else
            git commit -m "bot: offset $(date -u +'%H:%M UTC')"
            git pull --rebase origin HEAD
            git push
          fi
